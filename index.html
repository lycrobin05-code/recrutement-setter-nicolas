<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recrutement — CycloHacker</title>
  <meta name="description" content="CycloHacker recrute un setter. Regarde la vidéo et postule en 5 minutes.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E8622A;
      --dark:   #0F0F0F;
      --dark2:  #1A1A1A;
      --dark3:  #242424;
      --text:   #F0F0F0;
      --muted:  #888;
      --border: #2E2E2E;
    }
    html { scroll-behavior: smooth; }
    body { font-family: "Inter", sans-serif; background: var(--dark); color: var(--text); line-height: 1.65; -webkit-font-smoothing: antialiased; }
    img { max-width: 100%; display: block; }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #0F0F0F 0%, #1a0a00 100%);
      padding: 72px 0 80px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: var(--orange);
      color: #fff;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 6px 16px; border-radius: 100px;
      margin-bottom: 28px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800; line-height: 1.1;
      color: var(--text); max-width: 640px; margin: 0 auto 20px;
    }
    .hero h1 span { color: var(--orange); }
    .hero .sub {
      font-size: 1.05rem; color: var(--muted);
      max-width: 480px; margin: 0 auto; line-height: 1.6;
    }

    /* VIDEO */
    .video-section {
      padding: 56px 0 0;
      background: var(--dark);
      text-align: center;
    }
    .video-label {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--orange); margin-bottom: 24px;
    }
    .video-label::before, .video-label::after {
      content: ''; display: block; width: 28px; height: 1px;
      background: var(--orange); opacity: 0.4;
    }
    .video-wrapper {
      position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .video-wrapper video {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border-radius: 12px; display: block;
    }

    /* CTA FLÉCHÉ */
    .cta-arrow {
      background: var(--dark);
      padding: 40px 0;
      text-align: center;
    }
    .cta-arrow .container {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .cta-arrow p {
      color: var(--text); font-size: 1.05rem; font-weight: 700;
    }
    .cta-arrow .arrow {
      color: var(--orange); font-size: 1.5rem;
      animation: bounce 1.4s infinite;
    }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

    /* FORMULAIRE */
    .form-section {
      padding: 0 0 80px;
      background: var(--dark);
    }
    .form-wrapper {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    /* FOOTER */
    footer {
      background: var(--dark2);
      border-top: 1px solid var(--border);
      padding: 28px 0;
      text-align: center;
    }
    footer p { font-size: 12px; color: var(--muted); letter-spacing: 0.02em; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .hero { padding: 56px 0 64px; }
      .hero h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <div class="badge">Recrutement ouvert</div>
      <h1>Coaching Cyclisme<br>recrute un <span>setter</span></h1>
      <p class="sub">Regarde la vidéo jusqu'au bout — si tu te reconnais, tu sais ce que tu as à faire.</p>
    </div>
  </section>

  <!-- VIDEO -->
  <section class="video-section">
    <div class="container">
      <div class="video-label">Regarde avant de postuler</div>
      <div class="video-wrapper">
        <video controls preload="metadata" playsinline>
          <source src="video-recrutement.mp4" type="video/mp4">
          Votre navigateur ne supporte pas la lecture vidéo.
        </video>
      </div>
    </div>
  </section>

  <!-- CTA FLÉCHÉ -->
  <div class="cta-arrow">
    <div class="container">
      <p>Candidate ci-dessous</p>
      <span class="arrow">↓</span>
    </div>
  </div>

  <!-- FORMULAIRE -->
  <section class="form-section" id="postuler">
    <div class="container">
      <div class="form-wrapper">
        <iframe
          src="https://airtable.com/embed/appXCBUw6lqC9ZMcC/pagGVNDJ6M86B2w9u/form"
          title="Formulaire de candidature"
          frameborder="0"
          scrolling="yes"
          style="width:100%; min-height:1200px; border:none; display:block;">
        </iframe>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>© 2026 CycloHacker · Tous droits réservés</p>
    </div>
  </footer>

</body>
</html>
